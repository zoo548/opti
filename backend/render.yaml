services:
  - type: web
    name: opti-backend
    runtime: python
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.5"
      - key: KAKAO_REST_API_KEY
        sync: false
      - key: TMAP_API_KEY
        sync: false
      - key: ODSAY_API_KEY
        sync: false
