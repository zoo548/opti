# Render Blueprint — Root Directory를 "backend"로 설정하거나
# 이 파일 경로를 backend/render.yaml 로 지정해서 사용하세요.
services:
  - type: web
    name: opti-backend
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.5"
      - key: KAKAO_REST_API_KEY
        sync: false
      - key: TMAP_API_KEY
        sync: false
      - key: ODSAY_API_KEY
        sync: false
