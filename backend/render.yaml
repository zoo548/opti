services:
  - type: web
    name: opti-backend
    runtime: python
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.5
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: GEOCODE_PROVIDER
        value: nominatim
      - key: NOMINATIM_USER_AGENT
        value: opti-backend/0.1 (contact@example.com)
      - key: HTTP_TIMEOUT_SECONDS
        value: "10"
